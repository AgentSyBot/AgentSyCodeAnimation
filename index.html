<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSyCode Animation</title>

<!-- استيراد خطوط Google -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
    color: #fff;
  }

  /* حاوية الشعار */
  .logo-container {
    width: 400px;
    height: 400px;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(100px);
    animation: riseGlow 2s forwards;
  }

  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @keyframes riseGlow {
    0% {
      opacity: 0;
      transform: translateY(100px) scale(0.5);
      filter: drop-shadow(0 0 0px #ffd700);
    }
    50% {
      opacity: 1;
      transform: translateY(-10px) scale(1.05);
      filter: drop-shadow(0 0 20px #ffd700);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: drop-shadow(0 0 15px #ffd700);
    }
  }

  /* نص اسفل الصفحة */
  .footer-text {
    position: absolute;
    bottom: 20px;
    text-align: center;
    font-size: 16px;
    color: #fff;
    line-height: 1.5;
  }

  .footer-text a {
    color: #ffd700;
    text-decoration: none;
    font-weight: bold;
    margin-left: 5px;
    transition: all 0.3s ease;
  }

  .footer-text a:hover {
    text-decoration: underline;
    color: #fff;
  }

  /* الخط العربي */
  .arabic-text {
    font-family: 'Cairo', sans-serif;
    direction: rtl;
  }

  /* الخط الإنجليزي */
  .english-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
  }
</style>
</head>

<body>

<!-- شعار الفريق -->
<div class="logo-container">
  <img src="https://i.imgur.com/TixsklP.png" alt="AgentSyCode Logo">
</div>

<!-- نص اسفل الصفحة -->
<div class="footer-text arabic-text">
  هذا الموقع من تطوير فريق  
  <br>
  <a class="english-text" href="https://t.me/AgentSyCode" target="_blank">AgentSyCode</a>
</div>

</body>
</html>
